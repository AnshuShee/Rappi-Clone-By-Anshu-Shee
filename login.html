<body>
  <div class="login-header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Rappi_logo.svg/100px-Rappi_logo.svg.png" alt="Rappi Logo">
  </div>
  <main class="login-main">
    <section class="login-left">
      <div class="login-left-content">
        <img class="login-graphic" src="https://png.pngtree.com/png-clipart/20241007/original/pngtree-logo-of-delivery-boy-png-image_16223992.png" alt="Rappi Promo">
        <div class="login-title">Sign up now and save on delivery costs</div>
        <div class="login-desc">Free deliveries during the first weeks when paying with card</div>
        <div class="login-subdesc">Valid for new users</div>
      </div>
    </section>
    <section class="login-right">
      <div class="login-form-box">
        <div class="login-form-title">Register or sign in to continue</div>
        <div class="login-btns-list">
          <button class="login-btn login-btn-google"><i class="fab fa-google"></i>Continue with Google</button>
          <button class="login-btn login-btn-cell"><i class="fas fa-phone"></i>Continue with your mobile</button>
          <button class="login-btn login-btn-facebook"><i class="fab fa-facebook-f"></i>Continue with Facebook</button>
          <button class="login-btn login-btn-apple"><i class="fab fa-apple"></i>Continue with Apple</button>
          <button class="login-btn">I already have an account</button>
        </div>
      </div>
    </section>
  </main>
</body>
